<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpellQuest — AR Spelling Adventure</title>
    <meta name="description" content="SpellQuest: An augmented reality spelling game. Use hand gestures to drag letter tiles and spell words!" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- DNS pre-connect to speed up CDN requests -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- Pre-warm MediaPipe: create + initialize the Hands model immediately
         so the WASM download happens in the background while the user is on
         the menu, rather than after they click Play. -->
    <script>
      window.__mpReady = false;
      function __warmMediaPipe() {
        if (!window.Hands) { setTimeout(__warmMediaPipe, 100); return; }
        try {
          window.__mpHandsWarm = new window.Hands({
            locateFile: function(f) {
              return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + f;
            }
          });
          window.__mpHandsWarm.setOptions({
            maxNumHands: 2,
            modelComplexity: 0,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5,
          });
          // Send a black dummy frame to trigger WASM + model download now
          window.__mpHandsWarm.onResults(function() { window.__mpReady = true; });
          var offscreen = document.createElement('canvas');
          offscreen.width = 1280; offscreen.height = 720;
          window.__mpHandsWarm.send({ image: offscreen }).catch(function(){});
        } catch(e) {}
      }
      __warmMediaPipe();
    </script>
    <style>
      body {
        margin: 0;
        background-color: #f8f9fa;
        color: #3c4043;
        overflow: hidden;
        font-family: 'Roboto', sans-serif;
      }
      video { display: none; }
      /* Initial splash shown before React hydrates */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        transition: opacity 0.6s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash h1 { font-size: 2.5rem; font-weight: 900; color: #fff; margin: 0 0 8px; }
      #splash p { color: rgba(255,255,255,0.7); font-size: 1rem; margin: 0 0 32px; }
      .splash-spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(255,255,255,0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Splash screen visible until React mounts -->
    <div id="splash">
      <h1>✨ SpellQuest</h1>
      <p>Loading AR experience...</p>
      <div class="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Hide splash once React has rendered something meaningful
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          observer.disconnect();
          setTimeout(() => {
            document.getElementById('splash')?.classList.add('hidden');
          }, 300);
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
